<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parycenter</title>
  <script>
    // Apply saved theme (or system preference) before stylesheets load to avoid FOUC.
    (function () {
      const saved = localStorage.getItem("parycenter-theme");
      const dark = saved === "dark" ||
        (!saved && window.matchMedia?.("(prefers-color-scheme: dark)").matches);
      if (dark) document.documentElement.dataset.theme = "dark";
    })();
  </script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <aside id="panel">
    <header>
      <div class="header-row">
        <h1>🍺 Parycenter</h1>
        <div class="header-buttons">
          <button type="button" id="lang-toggle" class="icon-button" data-i18n-title="toggleLang">EN</button>
          <button type="button" id="theme-toggle" class="icon-button" data-i18n-title="toggleTheme">🌙</button>
        </div>
      </div>
      <p class="tagline" data-i18n="tagline"></p>
    </header>

    <section class="block">
      <h2 data-i18n="participants"></h2>
      <div id="participants"></div>
      <button type="button" id="add-participant" class="ghost" data-i18n="addPerson"></button>
    </section>

    <section class="block">
      <h2 data-i18n="target"></h2>
      <label class="checkbox"><input type="checkbox" data-poi-kind="bar" checked /> <span data-i18n="bar"></span></label>
      <label class="checkbox"><input type="checkbox" data-poi-kind="pub" checked /> <span data-i18n="pub"></span></label>
      <label class="checkbox"><input type="checkbox" data-poi-kind="restaurant" /> <span data-i18n="restaurant"></span></label>

      <label class="range">
        <span data-i18n="numResults"></span>: <output id="n-results-val">5</output>
        <input type="range" id="n-results" min="1" max="15" value="5" />
      </label>

      <label class="range">
        <span data-i18n="searchRadius"></span>: <output id="radius-val">1500</output> m
        <input type="range" id="radius" min="500" max="5000" step="250" value="1500" />
      </label>
    </section>

    <details class="block settings" id="settings">
      <summary data-i18n="settings"></summary>
      <div id="settings-body"></div>
    </details>

    <button type="button" id="find" class="primary" data-i18n="findSpot"></button>

    <section id="status" class="block status"></section>

    <section id="results-wrap" class="block hidden">
      <h2 data-i18n="results"></h2>
      <ol id="results"></ol>
    </section>

    <footer>
      <small>
        Data © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> ·
        Routing by <a href="https://openrouteservice.org" target="_blank" rel="noopener">ORS</a> +
        <a href="https://transitous.org" target="_blank" rel="noopener">Transitous</a> ·
        Geocoding by <a href="https://nominatim.org" target="_blank" rel="noopener">Nominatim</a>
      </small>
    </footer>
  </aside>

  <main id="map"></main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
